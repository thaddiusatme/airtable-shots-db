<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Transcript → Airtable</title>
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #333;
    }
    
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    
    .status.info {
      background: #e3f2fd;
      color: #1565c0;
    }
    
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    
    .video-info {
      margin-bottom: 12px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .video-info strong {
      display: block;
      margin-bottom: 4px;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    
    button:hover {
      background: #1565c0;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .settings-link {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
    }
    
    .settings-link a {
      color: #1976d2;
      text-decoration: none;
    }
    
    .settings-link a:hover {
      text-decoration: underline;
    }
    
    .transcript-preview {
      max-height: 100px;
      overflow-y: auto;
      padding: 8px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>📝 YouTube Transcript Saver</h1>
  
  <div id="statusMessage" class="status info">
    Ready to extract transcript...
  </div>
  
  <div id="videoInfo" class="video-info hidden">
    <strong id="videoTitle">Video Title</strong>
    <span id="videoId">Video ID</span>
  </div>
  
  <div id="transcriptPreview" class="transcript-preview hidden">
    <!-- Transcript preview will be shown here -->
  </div>
  
  <button id="extractBtn">Extract Transcript</button>
  <button id="saveBtn" class="hidden" disabled>Save to Airtable</button>
  
  <div class="settings-link">
    <a href="#" id="settingsLink">⚙️ Settings</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
