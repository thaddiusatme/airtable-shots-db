<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pipeline Server Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #f8fafc; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .health { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 24px; }
    .health.ok { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .health.offline { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
    .jobs-list { display: flex; flex-direction: column; gap: 12px; }
    .job-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .job-card:hover { border-color: #475569; }
    .job-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .job-id { font-family: monospace; font-size: 12px; color: #94a3b8; }
    .job-video { font-weight: 600; font-size: 14px; color: #f1f5f9; }
    .job-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-queued { background: #a855f722; color: #c084fc; }
    .status-running { background: #2563eb22; color: #60a5fa; }
    .status-done { background: #16a34a22; color: #4ade80; }
    .status-error { background: #dc262622; color: #f87171; }
    .job-message { font-size: 13px; color: #94a3b8; margin-top: 6px; }
    .job-time { font-size: 11px; color: #475569; margin-top: 4px; }
    .empty { text-align: center; color: #475569; padding: 40px; font-size: 14px; }
    .refresh-info { font-size: 11px; color: #475569; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <h1>🚀 Pipeline Server Dashboard</h1>
  <div class="subtitle">http://127.0.0.1:3333</div>
  <div id="healthBadge" class="health offline">Checking...</div>

  <div id="jobsList" class="jobs-list">
    <div class="empty">Loading...</div>
  </div>

  <div class="refresh-info">Auto-refreshes every 3 seconds</div>

  <script>
    const SERVER = 'http://127.0.0.1:3333';
    const healthBadge = document.getElementById('healthBadge');
    const jobsList = document.getElementById('jobsList');

    async function refresh() {
      // Health
      try {
        const hRes = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(2000) });
        if (hRes.ok) {
          healthBadge.textContent = 'Server Online';
          healthBadge.className = 'health ok';
        } else {
          throw new Error();
        }
      } catch {
        healthBadge.textContent = 'Server Offline';
        healthBadge.className = 'health offline';
        jobsList.innerHTML = '<div class="empty">Server not reachable</div>';
        return;
      }

      // Jobs
      try {
        const jRes = await fetch(`${SERVER}/pipeline/jobs`);
        const jobs = await jRes.json();

        if (jobs.length === 0) {
          jobsList.innerHTML = '<div class="empty">No pipeline runs yet. Trigger one from the Chrome extension.</div>';
          return;
        }

        // For running jobs, fetch full status
        const rendered = await Promise.all(jobs.map(async (j) => {
          let message = j.message || '';
          if (j.status === 'running') {
            try {
              const sRes = await fetch(`${SERVER}/pipeline/status/${j.runId}`);
              const full = await sRes.json();
              message = full.message || message;
            } catch {}
          }

          const created = new Date(j.createdAt).toLocaleString();
          return `
            <div class="job-card">
              <div class="job-header">
                <span class="job-video">${escapeHtml(j.videoId)}</span>
                <span class="job-status status-${j.status}">${j.status}</span>
              </div>
              <div class="job-message">${escapeHtml(message)}</div>
              <div class="job-time">
                <span class="job-id">${j.runId.slice(0, 8)}...</span> · ${created}
              </div>
            </div>
          `;
        }));

        jobsList.innerHTML = rendered.join('');
      } catch (e) {
        console.error('Jobs fetch error:', e);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
