<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Triage</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #0b0f19; color: #e7eaf0; }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .card { background: #121a2b; border: 1px solid #22304d; border-radius: 12px; padding: 16px; }
      .row { display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 16px; }
      .title { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
      .meta { font-size: 13px; color: #aab3c5; margin: 0 0 12px; word-break: break-all; }
      .btns { display: flex; gap: 10px; margin-top: 10px; }
      button { border: 0; border-radius: 10px; padding: 10px 12px; font-weight: 600; cursor: pointer; }
      .done { background: #1f8b4c; color: white; }
      .declined { background: #c2410c; color: white; }
      .skip { background: #334155; color: white; }
      iframe { width: 100%; aspect-ratio: 16 / 9; border: 0; border-radius: 12px; }
      .empty { padding: 28px; text-align: center; color: #aab3c5; }
      a { color: #8ab4ff; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 style="margin: 0 0 16px; font-size: 22px;">Video Triage</h1>

      {% if empty %}
        <div class="card empty">
          No queued videos. Set some videos to <b>Queued</b> and refresh.
        </div>
      {% else %}
        <div class="row">
          <div class="card">
            {% if video_id %}
              <iframe src="https://www.youtube.com/embed/{{ video_id }}" allowfullscreen></iframe>
            {% else %}
              <div class="empty">Missing Video ID on this Airtable record.</div>
            {% endif %}
          </div>

          <div class="card">
            <p class="title">{{ title }}</p>
            <p class="meta">
              Status: <b>{{ triage_status }}</b><br />
              <a href="{{ url }}" target="_blank" rel="noreferrer">Open on YouTube</a>
            </p>

            <div class="btns">
              <form method="post" action="/set-status">
                <input type="hidden" name="record_id" value="{{ record_id }}" />
                <input type="hidden" name="status" value="Done" />
                <button class="done" type="submit">Done</button>
              </form>

              <form method="post" action="/set-status">
                <input type="hidden" name="record_id" value="{{ record_id }}" />
                <input type="hidden" name="status" value="Declined" />
                <button class="declined" type="submit">Decline</button>
              </form>

              <form method="post" action="/set-status">
                <input type="hidden" name="record_id" value="{{ record_id }}" />
                <input type="hidden" name="status" value="Skipped" />
                <button class="skip" type="submit">Next</button>
              </form>
            </div>
          </div>
        </div>
      {% endif %}
    </div>
  </body>
</html>
